    // Storage helper para localStorage
    const storage = {
      get: async (key) => {
        try {
          const value = localStorage.getItem(key);
          return value ? { value } : null;
        } catch (error) {
          return null;
        }
      },
      set: async (key, value) => {
        try {
          localStorage.setItem(key, value);
          return { key, value };
        } catch (error) {
          return null;
        }
      }
    };
    
    // Reemplazar window.storage con nuestro localStorage
    window.storage = storage;

            <div className={`w-14 h-7 rounded-full transition-all pointer-events-none ${settings.animations ? 'bg-purple-500' : 'bg-gray-300'}`}>
              <div className={`w-6 h-6 bg-white rounded-full shadow-md transition-all transform ${settings.animations ? 'translate-x-7' : 'translate-x-0.5'} mt-0.5`}></div>
            </div>
          </div>
          
          <div 
            className="flex items-center justify-between cursor-pointer select-none"
            onClick={(e) => {
              e.preventDefault();
              e.stopPropagation();
              const newValue = !settings.sounds;
              const newSettings = { ...settings, sounds: newValue };
              console.log('Sounds clicked, new value:', newValue);
              saveSettings(newSettings);
            }}
          >
            <span className="text-gray-700 text-lg flex items-center gap-2 pointer-events-none">
              {settings.sounds ? <Volume2 size={20} /> : <VolumeX size={20} />}
              Sonidos
            </span>
            <div className={`w-14 h-7 rounded-full transition-all pointer-events-none ${settings.sounds ? 'bg-purple-500' : 'bg-gray-300'}`}>
              <div className={`w-6 h-6 bg-white rounded-full shadow-md transition-all transform ${settings.sounds ? 'translate-x-7' : 'translate-x-0.5'} mt-0.5`}></div>
            </div>
          </div>
          
          <div 
            className="flex items-center justify-between cursor-pointer select-none"
            onClick={(e) => {
              e.preventDefault();
              e.stopPropagation();
              const newValue = !settings.music;
              const newSettings = { ...settings, music: newValue };
              console.log('Music clicked, new value:', newValue);
              saveSettings(newSettings);
            }}
          >
            <span className="text-gray-700 text-lg flex items-center gap-2 pointer-events-none">
              <Music size={20} />
              Música ambiente
            </span>
            <div className={`w-14 h-7 rounded-full transition-all pointer-events-none ${settings.music ? 'bg-purple-500' : 'bg-gray-300'}`}>
              <div className={`w-6 h-6 bg-white rounded-full shadow-md transition-all transform ${settings.music ? 'translate-x-7' : 'translate-x-0.5'} mt-0.5`}></div>
            </div>
          </div>
        </div>
      </div>

      {/* Estadísticas */}
      <div className="bg-white p-6 rounded-3xl shadow-lg border-4 border-yellow-200">
        <h3 className="font-bold text-gray-800 mb-4 text-xl">Estadísticas</h3>
        <div className="grid grid-cols-2 gap-4">
          <div className="text-center p-5 bg-purple-50 rounded-2xl border-2 border-purple-200">
            <p className="text-4xl font-bold text-purple-600">{allEntries.length}</p>
            <p className="text-sm text-gray-600 mt-1">Registros totales</p>
          </div>
          <div className="text-center p-5 bg-blue-50 rounded-2xl border-2 border-blue-200">
            <p className="text-4xl font-bold text-blue-600">
              {new Set(allEntries.map(e => e.timestamp.split('T')[0])).size}
            </p>
            <p className="text-sm text-gray-600 mt-1">Días registrados</p>
          </div>
          <div className="text-center p-5 bg-green-50 rounded-2xl border-2 border-green-200">
            <p className="text-4xl font-bold text-green-600">{mailbox.length}</p>
            <p className="text-sm text-gray-600 mt-1">Cartas recibidas</p>
          </div>
          {settings.gamification && (
            <div className="text-center p-5 bg-amber-50 rounded-2xl border-2 border-amber-200">
              <p className="text-4xl font-bold text-amber-600">{stars}</p>
              <p className="text-sm text-gray-600 mt-1">Estrellas</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );

  // Navegación principal
  const navItems = [
    { id: 'home', label: 'Inicio', icon: Home, color: 'from-green-400 to-lime-500', emoji: '🏡' },
    { id: 'mail', label: 'Buzón', icon: Mail, color: 'from-blue-400 to-cyan-400', badge: mailbox.filter(m => !m.read).length, emoji: '📬' },
    { id: 'insights', label: 'Insights', icon: Brain, color: 'from-purple-400 to-pink-400', emoji: '🧠' },
    { id: 'settings', label: 'Config', icon: Settings, color: 'from-gray-400 to-gray-600', emoji: '⚙️' }
  ];

  if (loading) {
    return (
      <div className={`min-h-screen bg-gradient-to-br ${activeTheme.colors.bg} flex items-center justify-center`}>
        <div className="text-center">
          <div className="animate-spin rounded-full h-20 w-20 border-4 border-green-500 border-t-transparent mx-auto mb-4"></div>
          <p className="text-gray-600 text-xl font-medium">Cargando tu diario...</p>
        </div>
      </div>
    );
  }

  return (
    <div className={`min-h-screen bg-gradient-to-br ${activeTheme.colors.bg}`}>
      <style>{`
        @keyframes float {
          0%, 100% { transform: translateY(0px) rotate(0deg); }
          50% { transform: translateY(-20px) rotate(5deg); }
        }
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes bounce-slow {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-5px); }
        }
        .animate-float {
          animation: float 6s ease-in-out infinite;
        }
        .animate-fadeIn {
          animation: fadeIn 0.3s ease-in;
        }
        .animate-bounce-slow {
          animation: bounce-slow 3s ease-in-out infinite;
        }
      `}</style>

      <div className="max-w-4xl mx-auto p-4">
        {/* Vista principal */}
        <div className="min-h-screen">
          {currentView === 'home' && renderHomeView()}
          {currentView === 'mail' && renderMailView()}
          {currentView === 'insights' && renderInsightsView()}
          {currentView === 'settings' && renderSettingsView()}
        </div>

        {/* Navegación inferior estilo AC */}
        <div className="fixed bottom-0 left-0 right-0 bg-gradient-to-r from-yellow-100 via-green-100 to-blue-100 border-t-4 border-amber-400 shadow-2xl">
          <div className="max-w-4xl mx-auto px-4 py-4">
            <div className="flex justify-around items-center">
              {navItems.map(item => {
                const Icon = item.icon;
                const isActive = currentView === item.id;
                return (
                  <button
                    key={item.id}
                    onClick={() => setCurrentView(item.id)}
                    className="relative flex flex-col items-center gap-1 transition-all"
                  >
                    <div className={`p-4 rounded-2xl transition-all border-3 ${
                      isActive
                        ? `bg-gradient-to-r ${item.color} shadow-xl scale-110 border-white`
                        : 'bg-white border-gray-300 shadow-md'
                    }`}>
                      <Icon
                        size={26}
                        className={isActive ? 'text-white' : 'text-gray-600'}
                      />
                    </div>
                    <span className={`text-xs font-bold ${
                      isActive ? 'text-gray-800' : 'text-gray-600'
                    }`}>
                      {item.label}
                    </span>
                    {item.badge > 0 && (
                      <div className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-6 h-6 flex items-center justify-center font-bold border-2 border-white shadow-lg">
                        {item.badge}
                      </div>
                    )}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {/* Modales */}
      {(showCheckIn || showDailySummary) && renderCheckInModal()}
    </div>
  );
};


    
    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CozyJournal />);
  </script>

  <script>
    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('Service Worker registrado:', reg.scope))
          .catch(err => console.log('Error al registrar Service Worker:', err));
      });
    }

    // PWA Install Prompt
    let deferredPrompt;
    const installPrompt = document.getElementById('install-prompt');
    const installButton = document.getElementById('install-button');
    const dismissButton = document.getElementById('dismiss-button');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installPrompt.style.display = 'flex';
    });

    installButton.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      
      console.log(`Resultado de instalación: ${outcome}`);
      deferredPrompt = null;
      installPrompt.style.display = 'none';
    });

    dismissButton.addEventListener('click', () => {
      installPrompt.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
      console.log('PWA instalada exitosamente');
      installPrompt.style.display = 'none';
    });
  </script>
</body>
</html>
